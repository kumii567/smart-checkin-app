<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="smart_class_checkin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>smart_class_checkin</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f0fdfa;
      font-family: Arial, sans-serif;
    }
    #boot-screen {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #134e4a;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    #boot-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    #boot-text {
      opacity: 0.8;
      max-width: 520px;
      line-height: 1.4;
    }
    #boot-retry {
      margin-top: 16px;
      border: none;
      border-radius: 12px;
      background: #0d9488;
      color: white;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <div id="boot-screen">
    <div id="boot-title">Loading Smart Class Check-in…</div>
    <div id="boot-text">If this takes too long, check your internet and refresh the page.</div>
    <button id="boot-retry" onclick="window.location.reload()">Reload</button>
  </div>

  <script>
    const bootText = document.getElementById('boot-text');
    const failTimer = setTimeout(() => {
      bootText.textContent = 'The app is taking too long to start. Press Reload or use Ctrl + Shift + R.';
    }, 15000);

    window.addEventListener('flutter-first-frame', () => {
      clearTimeout(failTimer);
      const screen = document.getElementById('boot-screen');
      if (screen) screen.style.display = 'none';
    });

    window.addEventListener('error', () => {
      bootText.textContent = 'App startup failed. Press Reload or try again in an Incognito window.';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
